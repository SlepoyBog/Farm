name: AI Content Farm

on:
  schedule:
    - cron: '0 6 * * *'   # 09:00 MSK
    - cron: '0 10 * * *'  # 13:00 MSK
    - cron: '0 14 * * *'  # 17:00 MSK
    - cron: '0 18 * * *'  # 21:00 MSK
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1

      - run: python src/main.py --full
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VK_ACCESS_TOKEN: ${{ secrets.VK_ACCESS_TOKEN }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - run: python src/feedback_loop.py
        env:
          VK_ACCESS_TOKEN: ${{ secrets.VK_ACCESS_TOKEN }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/ -A
          git diff --staged --quiet || git commit -m "Auto-update site [skip ci]"
          git push
