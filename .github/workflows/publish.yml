name: AI Content Farm

on:
  schedule:
    - cron: '0 6 * * *'   # 09:00 MSK
    - cron: '0 9 * * *'   # 12:00 MSK
    - cron: '0 10 * * *'  # 13:00 MSK
    - cron: '0 14 * * *'  # 17:00 MSK
    - cron: '0 16 * * *'  # 19:00 MSK
    - cron: '0 18 * * *'  # 21:00 MSK
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1

      - run: python src/main.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VK_ACCESS_TOKEN: ${{ secrets.VK_ACCESS_TOKEN }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          DZEN_SESSION_COOKIE: ${{ secrets.DZEN_SESSION_COOKIE }}

      - run: python src/feedback_loop.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          VK_ACCESS_TOKEN: ${{ secrets.VK_ACCESS_TOKEN }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit version bump back to repo
        run: |
          git config user.name "Farm Bot"
          git config user.email "farm-bot@users.noreply.github.com"
          VERSION=$(cat VERSION)
          NEXT=$((VERSION + 1))
          echo "$NEXT" > VERSION
          git add -A
          git commit -m "v$NEXT: auto-deploy via CI [skip ci]" || echo "Nothing to commit"
          git push origin main
